<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>全球原物料 & 債券殖利率 — 風險管理儀表板</title>
<meta name="description" content="追蹤黃金、白銀、原油、天然氣與美債殖利率的每日收盤數據。長期投資者風險管理工具。"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(172deg,#040810,#06101a 30%,#081420);min-height:100vh;font-family:'Outfit','Noto Sans TC',sans-serif;color:#b0c4d8}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{height:5px;width:6px}
::-webkit-scrollbar-track{background:#040810}
::-webkit-scrollbar-thumb{background:#10202e;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
a{color:#4FC3F7;text-decoration:underline}
a:hover{opacity:.8}

.wrap{max-width:1200px;margin:0 auto;padding:20px 16px}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.hdr h1{font-size:23px;font-weight:800;color:#dce6f0;letter-spacing:-.4px}
.hdr h1 span{color:#4FC3F7;margin-right:8px;font-size:20px}
.sub{font-size:10px;color:#1e3448;margin-top:4px;letter-spacing:2.5px;font-weight:700}
.status{background:#081018;border-radius:10px;padding:5px 12px;font-size:10px;color:#2e4458;border:1px solid #10202e;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%}
.btn{background:linear-gradient(135deg,#0e1a28,#081420);border:1px solid #10202e;border-radius:10px;padding:5px 14px;color:#4FC3F7;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.btn:hover{border-color:#4FC3F7}
.btn:disabled{color:#1e3448;cursor:default}
.warn{margin-top:10px;background:#eab30808;border:1px solid #eab30818;border-radius:10px;padding:8px 14px;font-size:11px;color:#a68920;display:flex;align-items:center;gap:8px;line-height:1.6}

.panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-bottom:14px}
.card{background:linear-gradient(150deg,#081420,#060e18);border-radius:16px;padding:16px 20px;border:1px solid #0e1e2e}
.card-label{font-size:9px;color:#1e3448;font-weight:700;letter-spacing:2.5px;margin-bottom:6px}

.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tab{border-radius:10px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:'Outfit','Noto Sans TC',sans-serif;transition:all .2s}

.tbl-wrap{background:linear-gradient(155deg,#071018,#050c14);border-radius:16px;border:1px solid #0e1e2e;overflow:hidden}
table{width:100%;border-collapse:collapse;min-width:880px}
thead th{padding:11px 14px;font-size:9px;font-weight:700;color:#1e3448;letter-spacing:2px;text-transform:uppercase;user-select:none;white-space:nowrap}
tbody tr{border-bottom:1px solid #0a1620;cursor:pointer;transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#081420}
tbody td{padding:10px 14px}

.chip{display:inline-flex;align-items:center;gap:3px;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700}
.chip.up{background:#10b98110;border:1px solid #10b98118;color:#10b981}
.chip.dn{background:#ef444410;border:1px solid #ef444418;color:#ef4444}

.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(4,8,14,.9);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:linear-gradient(155deg,#0c1620,#081018);border-radius:20px;border:1px solid #1a2e44;max-width:740px;width:100%;padding:28px 32px;position:relative;box-shadow:0 32px 100px rgba(0,0,0,.6)}
.modal-close{position:absolute;top:16px;right:20px;background:#0e1a28;border:1px solid #1a2e44;border-radius:8px;width:32px;height:32px;color:#4a6a8e;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:#e0e8f0;border-color:#4FC3F7}

.footer{margin-top:14px;font-size:10px;color:#14263a;line-height:1.8;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid #14263a;border-top:3px solid #4FC3F7;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="app" class="loading">
  <div class="spinner"></div>
  <div style="color:#2e4458;font-size:14px">正在載入每日收盤數據...</div>
</div>

<script>
// ══════════ CONFIG ══════════
const API_KEY = "78da63ad2c4f4866b3ab9152cf265616";

const INSTRUMENTS = [
  {id:"gold",sym:"XAU/USD",name:"黃金",unit:"USD/oz",icon:"🥇",cat:"metals",bond:false,fb:4670},
  {id:"silver",sym:"XAG/USD",name:"白銀",unit:"USD/oz",icon:"🥈",cat:"metals",bond:false,fb:73.3},
  {id:"copper",sym:"XCU/USD",name:"銅",unit:"USD/lb",icon:"🔶",cat:"metals",bond:false,fb:4.85},
  {id:"platinum",sym:"XPT/USD",name:"鉑金",unit:"USD/oz",icon:"⬜",cat:"metals",bond:false,fb:1020},
  {id:"wti",sym:"WTI/USD",name:"WTI 原油",unit:"USD/bbl",icon:"🛢️",cat:"energy",bond:false,fb:116},
  {id:"brent",sym:"BRN/USD",name:"布蘭特原油",unit:"USD/bbl",icon:"🛢️",cat:"energy",bond:false,fb:115},
  {id:"natgas",sym:"NG/USD",name:"天然氣",unit:"USD/MMBtu",icon:"🔥",cat:"energy",bond:false,fb:2.83},
  {id:"us2y",sym:"US2Y",name:"美債 2Y 殖利率",unit:"%",icon:"📊",cat:"bonds",bond:true,fb:3.95},
  {id:"us10y",sym:"US10Y",name:"美債 10Y 殖利率",unit:"%",icon:"📊",cat:"bonds",bond:true,fb:4.34},
  {id:"us20y",sym:"US20Y",name:"美債 20Y 殖利率",unit:"%",icon:"📊",cat:"bonds",bond:true,fb:4.65},
  {id:"us30y",sym:"US30Y",name:"美債 30Y 殖利率",unit:"%",icon:"📊",cat:"bonds",bond:true,fb:4.58},
];

const CAT_LABEL={metals:"貴金屬 & 基本金屬",energy:"能源",bonds:"美國公債殖利率"};
const CAT_COL={metals:"#D4AF37",energy:"#E8553A",bonds:"#4FC3F7"};

// ══════════ DATA ══════════
async function fetchTS(sym){
  const url=`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=1day&outputsize=31&apikey=${API_KEY}`;
  const r=await fetch(url); const j=await r.json();
  if(j.status==="error"||!j.values||j.values.length<2) return null;
  return j.values.slice().reverse();
}

function parse(inst,vals){
  const h=vals.map(v=>({d:v.datetime,c:parseFloat(v.close)}));
  const last=h[h.length-1].c, prev=h[h.length-2].c, chg=last-prev;
  return {price:last,change:chg,changePct:(chg/prev)*100,
    high30:Math.max(...h.map(x=>x.c)),low30:Math.min(...h.map(x=>x.c)),
    history:h,src:"Twelve Data",date:h[h.length-1].d};
}

function fallback(inst){
  const p=inst.fb; const h=[]; let v=p*(1-.03*Math.random());
  for(let i=0;i<30;i++){v+=(inst.bond?(Math.random()-.5)*.02:(Math.random()-.5)*p*.008);v=Math.max(v,p*.92);h.push({d:new Date(Date.now()-(30-i)*864e5).toISOString().slice(0,10),c:+v.toFixed(4)});}
  h.push({d:new Date().toISOString().slice(0,10),c:p});
  return {price:p,change:0,changePct:0,high30:Math.max(...h.map(x=>x.c)),low30:Math.min(...h.map(x=>x.c)),history:h,src:"基準價 (4/7)",date:"2026-04-07"};
}

async function loadAll(){
  const res={};
  const ps=INSTRUMENTS.map(async inst=>{try{const v=await fetchTS(inst.sym);if(v)return{id:inst.id,d:parse(inst,v)};}catch{}return{id:inst.id,d:null};});
  const settled=await Promise.allSettled(ps);
  settled.forEach(s=>{if(s.status==="fulfilled"&&s.value.d)res[s.value.id]=s.value.d;});
  INSTRUMENTS.forEach(i=>{if(!res[i.id])res[i.id]=fallback(i);});
  return res;
}

// ══════════ SVG CHARTS ══════════
function sparkSVG(hist,id,w=220,h=68){
  if(!hist||hist.length<2) return `<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:#2a3e52;font-size:10px">—</div>`;
  const up=hist[hist.length-1].c>=hist[0].c;
  const col=up?"#10b981":"#ef4444";
  const min=Math.min(...hist.map(x=>x.c)), max=Math.max(...hist.map(x=>x.c));
  const range=max-min||1;
  const pts=hist.map((p,i)=>{const x=(i/(hist.length-1))*w;const y=h-4-((p.c-min)/range)*(h-8);return `${x.toFixed(1)},${y.toFixed(1)}`;});
  const line=pts.join(" ");
  const area=line+` ${w},${h} 0,${h}`;
  const lastX=w, lastY=h-4-((hist[hist.length-1].c-min)/range)*(h-8);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;width:100%;height:${h}px">
    <defs><linearGradient id="g-${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".3"/><stop offset="100%" stop-color="${col}" stop-opacity=".02"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#g-${id})"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lastX}" cy="${lastY.toFixed(1)}" r="3" fill="${col}"/>
  </svg>`;
}

function bigChartSVG(hist,inst,w=660,h=280){
  if(!hist||hist.length<2) return "";
  const up=hist[hist.length-1].c>=hist[0].c;
  const col=up?"#10b981":"#ef4444";
  const min=Math.min(...hist.map(x=>x.c)), max=Math.max(...hist.map(x=>x.c));
  const range=max-min||1;
  const pad={t:20,r:16,b:30,l:60};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const pts=hist.map((p,i)=>{const x=pad.l+(i/(hist.length-1))*cw;const y=pad.t+ch-((p.c-min)/range)*ch;return{x,y,d:p.d,c:p.c};});
  const line=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=line+` ${pad.l+cw},${pad.t+ch} ${pad.l},${pad.t+ch}`;

  // Y axis ticks
  const yticks=5; let yLabels="";
  for(let i=0;i<=yticks;i++){
    const val=min+(range/yticks)*i;
    const y=pad.t+ch-((val-min)/range)*ch;
    yLabels+=`<line x1="${pad.l}" y1="${y}" x2="${pad.l+cw}" y2="${y}" stroke="#0e1e2e" stroke-width="1"/>`;
    yLabels+=`<text x="${pad.l-8}" y="${y+3}" text-anchor="end" fill="#2e4458" font-size="10" font-family="'JetBrains Mono',monospace">${val.toFixed(inst.bond?3:(val<10?2:0))}</text>`;
  }
  // X axis labels
  let xLabels="";
  const step=Math.max(1,Math.floor(hist.length/6));
  for(let i=0;i<hist.length;i+=step){
    const x=pad.l+(i/(hist.length-1))*cw;
    xLabels+=`<text x="${x}" y="${h-6}" text-anchor="middle" fill="#2e4458" font-size="10" font-family="'JetBrains Mono',monospace">${hist[i].d.slice(5)}</text>`;
  }

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;max-height:300px">
    <defs><linearGradient id="bg-${inst.id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".25"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    ${yLabels}${xLabels}
    <polygon points="${area}" fill="url(#bg-${inst.id})"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4" fill="${col}" stroke="#0a1218" stroke-width="2"/>
  </svg>`;
}

// ══════════ GAUGE ══════════
function gaugeSVG(value){
  const v=Math.max(0,Math.min(100,value)), ang=-90+(v/100)*180;
  const c=v<25?"#10b981":v<50?"#eab308":v<75?"#f97316":"#ef4444";
  const t=v<25?"低風險":v<50?"中等風險":v<75?"偏高風險":"高風險";
  return `<div style="text-align:center">
    <svg width="132" height="80" viewBox="0 0 132 80">
      <path d="M 12 70 A 54 54 0 0 1 120 70" fill="none" stroke="#0c1a28" stroke-width="10" stroke-linecap="round"/>
      <path d="M 12 70 A 54 54 0 0 1 120 70" fill="none" stroke="${c}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${(v/100)*170} 170" style="transition:all 1.5s"/>
      <line x1="66" y1="70" x2="66" y2="22" stroke="${c}" stroke-width="2.5" stroke-linecap="round" transform="rotate(${ang},66,70)" style="transition:transform 1.5s"/>
      <circle cx="66" cy="70" r="4" fill="${c}"/>
      <text x="66" y="62" text-anchor="middle" fill="#d0dce8" font-size="16" font-weight="700" font-family="'JetBrains Mono',monospace">${Math.round(v)}</text>
    </svg>
    <div style="color:${c};font-size:12px;font-weight:700;letter-spacing:1.5px;margin-top:-2px">${t}</div>
  </div>`;
}

// ══════════ RENDER ══════════
let DATA=null, API_OK=false, CAT="all", SORT_KEY=null, SORT_DIR="desc";

function fmtP(inst,v){return v.toFixed(inst.bond?3:(v<10?2:(v<200?2:0)));}

function render(){
  if(!DATA){document.getElementById("app").innerHTML=`<div class="loading"><div class="spinner"></div><div style="color:#2e4458;font-size:14px">正在載入每日收盤數據...</div></div>`;return;}
  const d=DATA;
  const risk=(()=>{const sp=(d.us10y?.price||4.34)-(d.us2y?.price||3.95);const oil=(d.wti?.price||116)>100?20:(d.wti?.price||0)>80?10:0;const gold=(d.gold?.price||4670)>4500?12:0;const oV=Math.abs(d.wti?.changePct||0)+Math.abs(d.brent?.changePct||0);const yH=(d.us10y?.price||4.34)>4.5?10:0;const sR=sp<0?25:sp<.3?12:0;return Math.min(98,Math.max(10,20+sR+oV*2+oil+gold+yH));})();
  const spread=(d.us10y?.price||4.34)-(d.us2y?.price||3.95);
  const dataDate=d.gold?.date||d.us10y?.date||"—";
  const dotCol=API_OK?"#10b981":"#eab308";

  let list=INSTRUMENTS.filter(i=>CAT==="all"||i.cat===CAT);
  if(SORT_KEY){list=[...list].sort((a,b)=>{const va=SORT_KEY==="name"?a.name:SORT_KEY==="price"?d[a.id]?.price:d[a.id]?.changePct;const vb=SORT_KEY==="name"?b.name:SORT_KEY==="price"?d[b.id]?.price:d[b.id]?.changePct;if(typeof va==="string")return SORT_DIR==="asc"?va.localeCompare(vb):vb.localeCompare(va);return SORT_DIR==="asc"?(va||0)-(vb||0):(vb||0)-(va||0);});}

  const keyItems=[{l:"黃金",id:"gold",p:"$",s:"",dc:0},{l:"WTI原油",id:"wti",p:"$",s:"",dc:0},{l:"10Y殖利率",id:"us10y",p:"",s:"%",dc:3}];

  const rows=list.map((inst,idx)=>{const dd=d[inst.id];if(!dd)return"";const up=dd.changePct>=0;const col=CAT_COL[inst.cat];
    return `<tr onclick="openDetail('${inst.id}')">
      <td><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">${inst.icon}</span><div><div style="font-size:13px;font-weight:700;color:#c8d8e8">${inst.name}</div><div style="font-size:10px;color:${col};font-weight:500;opacity:.7">${inst.sym} · ${inst.unit}</div></div></div></td>
      <td class="mono" style="text-align:right;font-size:15px;font-weight:700;color:#dce6f0">${inst.bond?"":"$"}${fmtP(inst,dd.price)}${inst.bond?`<span style="font-size:11px;color:#2e4458;margin-left:1px">%</span>`:""}</td>
      <td style="text-align:right"><span class="mono chip ${up?"up":"dn"}">${up?"▲":"▼"} ${Math.abs(dd.changePct).toFixed(2)}%</span><div class="mono" style="font-size:10px;color:${up?"#10b98155":"#ef444455"};margin-top:3px">${up?"+":""}${dd.change.toFixed(inst.bond?3:2)}</div></td>
      <td class="mono" style="text-align:right;font-size:11px"><span style="color:#10b981">${fmtP(inst,dd.high30)}</span><span style="margin:0 5px;color:#14223a">—</span><span style="color:#ef4444">${fmtP(inst,dd.low30)}</span></td>
      <td style="padding:6px 10px;width:240px">${sparkSVG(dd.history,inst.id)}</td>
    </tr>`;}).join("");

  const sortIcon=k=>SORT_KEY===k?`<span style="margin-left:4px;color:#4FC3F7">${SORT_DIR==="asc"?"↑":"↓"}</span>`:"";
  const tabs=["all","metals","energy","bonds"].map(c=>{const ac=CAT===c;const col=c==="all"?"#4FC3F7":CAT_COL[c];return `<button class="tab" onclick="setCat('${c}')" style="background:${ac?col+"12":"transparent"};border:1px solid ${ac?col+"30":"#0e1e2e"};color:${ac?col:"#1e3448"}">${c==="all"?"全部":CAT_LABEL[c]}</button>`;}).join("");

  document.getElementById("app").className="wrap";
  document.getElementById("app").innerHTML=`
    <div class="hdr">
      <div><h1><span>◈</span>全球原物料 & 債券殖利率</h1><div class="sub">DAILY RISK DASHBOARD · LONG-TERM INVESTOR EDITION</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="status mono"><span class="dot" style="background:${dotCol};box-shadow:0 0 10px ${dotCol}44"></span>收盤日：${dataDate}</div>
        <button class="btn" onclick="doRefresh()">⟳ 更新數據</button>
      </div>
    </div>
    ${!API_OK?`<div class="warn">⚠️ API 連線失敗，顯示 4/7 基準價。請確認 API Key 或網路連線。</div>`:""}

    <div class="panel">
      <div class="card" style="padding:16px 14px"><div class="card-label">COMPOSITE RISK INDEX</div>${gaugeSVG(risk)}</div>
      <div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:10px">
        <div class="card-label">YIELD SPREAD · 10Y − 2Y</div>
        <div class="mono" style="font-size:34px;font-weight:800;color:${spread<0?"#ef4444":spread<.3?"#eab308":"#10b981"};line-height:1">${spread>=0?"+":""}${spread.toFixed(3)}<span style="font-size:14px;opacity:.5">%</span></div>
        <div style="font-size:11px;color:#2e4458">${spread<0?"⚠️ 殖利率曲線倒掛 — 衰退風險升高":spread<.3?"⚡ 利差偏窄 — 需密切關注":"✓ 曲線正常 — 利差健康"}</div>
      </div>
      <div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:7px">
        <div class="card-label">KEY INDICATORS</div>
        ${keyItems.map(x=>{const dd=d[x.id];if(!dd)return"";const u=dd.changePct>=0;return `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#3a5068">${x.l}</span><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:14px;font-weight:700;color:#d0dce8">${x.p}${dd.price.toFixed(x.dc)}${x.s}</span><span class="mono" style="font-size:11px;font-weight:600;color:${u?"#10b981":"#ef4444"};min-width:56px;text-align:right">${u?"▲":"▼"}${Math.abs(dd.changePct).toFixed(2)}%</span></div></div>`;}).join("")}
      </div>
    </div>

    <div class="tabs">${tabs}</div>

    <div class="tbl-wrap"><div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th style="text-align:left;cursor:pointer" onclick="doSort('name')">商品${sortIcon("name")}</th>
          <th style="text-align:right;cursor:pointer" onclick="doSort('price')">收盤價${sortIcon("price")}</th>
          <th style="text-align:right;cursor:pointer" onclick="doSort('changePct')">日漲跌${sortIcon("changePct")}</th>
          <th style="text-align:right">30日區間</th>
          <th style="text-align:center;width:250px">30 日走勢</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div>

    <div class="footer">
      <span>${API_OK?"數據源：Twelve Data API 每日收盤價（interval=1day）":"數據源：2026/4/7 驗證基準價"} · 點擊任一列展開 30 日圖表</span>
      <span>每日開啟時自動載入 · 手動點擊「更新數據」刷新</span>
    </div>

    <div id="modal"></div>
  `;
}

// ══════════ INTERACTIONS ══════════
function setCat(c){CAT=c;SORT_KEY=null;render();}
function doSort(k){if(SORT_KEY===k)SORT_DIR=SORT_DIR==="asc"?"desc":"asc";else{SORT_KEY=k;SORT_DIR="desc";}render();}
async function doRefresh(){
  document.querySelector(".btn").textContent="⏳ 載入中";
  document.querySelector(".btn").disabled=true;
  DATA=await loadAll();
  API_OK=Object.values(DATA).some(x=>x.src==="Twelve Data");
  render();
}

function openDetail(id){
  const inst=INSTRUMENTS.find(i=>i.id===id);
  const dd=DATA[id];
  if(!inst||!dd)return;
  const up=dd.changePct>=0, col=up?"#10b981":"#ef4444";
  document.getElementById("modal").innerHTML=`
    <div class="modal-bg" onclick="closeDetail()">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeDetail()">✕</button>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap">
          <span style="font-size:36px">${inst.icon}</span>
          <div>
            <div style="font-size:22px;font-weight:700;color:#e4ecf4">${inst.name}</div>
            <div style="font-size:12px;color:${CAT_COL[inst.cat]};font-weight:500">${inst.sym} · ${inst.unit} · <span style="color:#3e5672">${dd.src}</span> · <span style="color:#2e4458">${dd.date}</span></div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div class="mono" style="font-size:28px;font-weight:700;color:#e4ecf4">${inst.bond?"":"$"}${fmtP(inst,dd.price)}${inst.bond?`<span style="font-size:15px;opacity:.6">%</span>`:""}</div>
            <div class="mono" style="font-size:15px;font-weight:600;color:${col}">${up?"▲":"▼"} ${Math.abs(dd.changePct).toFixed(2)}% <span style="font-size:12px;opacity:.6">(${up?"+":""}${dd.change.toFixed(inst.bond?3:2)})</span></div>
          </div>
        </div>
        <div style="margin-bottom:20px">${bigChartSVG(dd.history,inst)}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;border-top:1px solid #14223a;padding-top:16px">
          <div style="text-align:center"><div style="font-size:10px;color:#2e4458;font-weight:600;letter-spacing:1px;margin-bottom:4px">30日最高</div><div class="mono" style="font-size:16px;font-weight:700;color:#10b981">${fmtP(inst,dd.high30)}</div></div>
          <div style="text-align:center"><div style="font-size:10px;color:#2e4458;font-weight:600;letter-spacing:1px;margin-bottom:4px">30日最低</div><div class="mono" style="font-size:16px;font-weight:700;color:#ef4444">${fmtP(inst,dd.low30)}</div></div>
          <div style="text-align:center"><div style="font-size:10px;color:#2e4458;font-weight:600;letter-spacing:1px;margin-bottom:4px">30日振幅</div><div class="mono" style="font-size:16px;font-weight:700;color:#eab308">${((dd.high30-dd.low30)/dd.low30*100).toFixed(2)}%</div></div>
        </div>
      </div>
    </div>`;
}

function closeDetail(){document.getElementById("modal").innerHTML="";}

// ══════════ INIT ══════════
(async()=>{
  DATA=await loadAll();
  API_OK=Object.values(DATA).some(x=>x.src==="Twelve Data");
  render();
})();
</script>
</body>
</html>
